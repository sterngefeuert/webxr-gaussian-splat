<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>WebXR Gaussian Splat Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #07070f;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }

    #canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
    }

    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    /* Top loading bar */
    #loading-bar-track {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 3px;
      background: rgba(255,255,255,0.05);
    }
    #loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      transition: width 0.25s ease;
    }

    /* Welcome panel */
    #welcome-panel {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: min(92vw, 440px);
      background: rgba(7, 7, 20, 0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 32px 28px;
      pointer-events: all;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #welcome-panel h1 {
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.3;
    }

    #welcome-panel p {
      font-size: 0.825rem;
      color: rgba(255,255,255,0.45);
      line-height: 1.5;
    }

    #url-input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: #fff;
      font-size: 0.875rem;
      outline: none;
      pointer-events: all;
      transition: border-color 0.2s;
    }
    #url-input::placeholder { color: rgba(255,255,255,0.25); }
    #url-input:focus { border-color: rgba(56, 189, 248, 0.5); }

    #load-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      border: none;
      border-radius: 10px;
      color: #07070f;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      pointer-events: all;
      transition: opacity 0.15s;
    }
    #load-btn:active { opacity: 0.8; }

    #drop-hint {
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.25);
    }

    /* Loading indicator */
    #loading-indicator {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(56, 189, 248, 0.2);
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-label {
      font-size: 0.825rem;
      color: rgba(255,255,255,0.5);
    }

    /* Reload button (top-right, shown after splat loaded) */
    #reload-btn {
      position: absolute;
      top: 16px; right: 16px;
      display: none;
      padding: 8px 16px;
      background: rgba(7, 7, 20, 0.8);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: rgba(255,255,255,0.7);
      font-size: 0.8rem;
      cursor: pointer;
      pointer-events: all;
      transition: border-color 0.2s, color 0.2s;
    }
    #reload-btn:hover { border-color: rgba(56,189,248,0.4); color: #38bdf8; }

    /* XR buttons container */
    #xr-buttons {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      pointer-events: all;
    }

    /* Status / error messages */
    #status-msg {
      position: absolute;
      bottom: 88px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.35);
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 0.8rem;
      color: #fca5a5;
      display: none;
      max-width: min(90vw, 380px);
      text-align: center;
      pointer-events: none;
    }

    /* Drag-over highlight */
    body.drag-over #overlay::after {
      content: 'Drop .splat / .ksplat / .ply file';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(56, 189, 248, 0.08);
      border: 2px dashed rgba(56, 189, 248, 0.4);
      font-size: 1.1rem;
      color: #38bdf8;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="overlay">
    <div id="loading-bar-track"><div id="loading-bar"></div></div>

    <div id="welcome-panel">
      <h1>WebXR Gaussian Splat Viewer</h1>
      <p>Paste a URL to a <code>.splat</code>, <code>.ksplat</code>, or <code>.ply</code> file — or drag &amp; drop a local file. On a compatible device the AR / VR buttons will appear once a scene is loaded.</p>
      <input id="url-input" type="url" placeholder="https://…/scene.splat" autocomplete="off" spellcheck="false" value="/splats/splat.ply">
      <button id="load-btn">Load Scene</button>
      <div id="drop-hint">or drag &amp; drop a local file anywhere on the page</div>
    </div>

    <div id="loading-indicator">
      <div class="spinner"></div>
      <div id="loading-label">Loading…</div>
    </div>

    <button id="reload-btn">Load New</button>

    <div id="xr-buttons"></div>

    <div id="status-msg"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
